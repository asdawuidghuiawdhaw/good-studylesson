server:
  port: 8087  #端口
  tomcat:
    uri-encoding: UTF-8   #服务编码
  error:
    include-message: always #返回的响应体带上message
spring:
  profiles:
    active: dev
  application:
    name: pay-service
  cloud:
    nacos:
      config:
        file-extension: yaml
        shared-configs: # 共享配置
          - dataId: shared-spring.yaml # 共享spring配置
          - dataId: shared-redis.yaml # 共享redis配置
          - dataId: shared-mybatis.yaml # 共享mybatis配置
          - dataId: shared-logs.yaml # 共享日志配置
          - dataId: shared-feign.yaml # 共享feign配置
          - dataId: shared-mq.yaml # 共享mq配置
          - dataId: shared-xxljob.yaml # 共享mq配置
tj:
  swagger:
    enable: true
    enableResponseWrap: true
    package-path: com.hxkt.pay.controller
    title: 好学云课堂 - 支付中心接口文档
    description: 该服务提供微信、支付宝等各种平台的支付、退款等功能
    contact-name: 好学云课堂项目组
    contact-url: https://haoxue.example.com/
    contact-email: dev@haoxue.example.com
    version: v1.0
  jdbc:
    database: tj_pay
  pay:
    notifyHost: https://6b9f16dd.r2.cpolar.top/ps
    ali:
      appId: ${ALI_PAY_APP_ID}
      merchantPrivateKey: ${ALI_PAY_MERCHANT_PRIVATE_KEY}
      publicKey: ${ALI_PAY_PUBLIC_KEY}
    wx:
      appId: ${WX_PAY_APP_ID}
      mchId: ${WX_PAY_MCH_ID}
      mchSerialNo: ${WX_PAY_MCH_SERIAL_NO}
      privateKey: ${WX_PAY_PRIVATE_KEY}
      apiV3Key: ${WX_PAY_API_V3_KEY}